version: "3.9"

# OpenDocX 一键部署 - Docker 一键部署 + 2 分钟跑起来
# 使用方法:
#   1. 复制环境变量: cp .env.example .env
#   2. 编辑 .env 填 LLM_API_KEY (OpenAI / 小米 mimo 都行)
#   3. docker compose up -d
#   4. 浏览器打开 http://localhost:3077
#   5. 登录 admin@opendocx.local / admin123

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: opendocx-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-opendocx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opendocx}
      POSTGRES_DB: ${POSTGRES_DB:-opendocx}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opendocx}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: opendocx-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: opendocx-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-opendocx}:${POSTGRES_PASSWORD:-opendocx}@postgres:5432/${POSTGRES_DB:-opendocx}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env (e.g. openssl rand -base64 64)}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_API_KEY: ${LLM_API_KEY:?Set LLM_API_KEY in .env (OpenAI/mimo/anthropic)}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-60}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3077,http://localhost:8001}
      DATA_DIR: /app/data
      ENVIRONMENT: ${ENVIRONMENT:-production}
    ports:
      - "8001:8001"
    volumes:
      - backend-data:/app/data
    command: >
      bash -c "
        python -c 'import asyncio; from app.db.session import engine; asyncio.run(engine.dispose())' &&
        alembic upgrade head &&
        python -m app.scripts.seed_demo &&
        uvicorn app.main:app --host 0.0.0.0 --port 8001
      "
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: /api
    container_name: opendocx-frontend
    depends_on:
      - backend
    ports:
      - "3077:80"
    restart: unless-stopped

volumes:
  pgdata:
    name: opendocx-postgres-data
  backend-data:
    name: opendocx-backend-data
